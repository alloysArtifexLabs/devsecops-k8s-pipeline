apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-demo-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alloysArtifexLabs/devops-learning-platform
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true       # removes resources deleted from Git
      selfHeal: true    # reverts manual kubectl changes