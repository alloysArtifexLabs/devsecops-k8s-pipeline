apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-demo-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alloysArtifexLabs/devsecops-k8s-pipeline
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true