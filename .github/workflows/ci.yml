name: DevSecOps CI Pipeline

# Trigger on pushes to main
# Ignore pushes that only update k8s manifests (prevents infinite loop
# when the pipeline commits updated image tags back to the repo)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alloysartifexlabs/devsecops-demo

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: CodeQL SAST
  # Scans Python source code for security vulnerabilities
  # e.g. SQL injection, hardcoded secrets, unsafe deserialization
  # ─────────────────────────────────────────────
  codeql-analysis:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ─────────────────────────────────────────────
  # JOB 2: Trivy Filesystem Scan
  # Scans the repo itself — Dockerfile misconfigurations,
  # vulnerable Python packages in requirements.txt,
  # and exposed secrets in code
  # ─────────────────────────────────────────────
  trivy-filesystem-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0          # warn but don't fail — Flask demo app is simple
          format: table

      - name: Run Trivy config scan (Dockerfile + k8s manifests)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  # ─────────────────────────────────────────────
  # JOB 3: Build, Scan Image, Push to GHCR
  # Only runs after Jobs 1 and 2 pass
  # Builds the Docker image, scans it with Trivy,
  # pushes to GitHub Container Registry,
  # then updates the image tag in deployment.yaml
  # so ArgoCD auto-deploys the new version
  # ─────────────────────────────────────────────
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [codeql-analysis, trivy-filesystem-scan]
    permissions:
      contents: write       # needed to commit updated image tag back to repo
      packages: write       # needed to push to GHCR
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build image locally (not pushed yet)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          load: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          severity: CRITICAL
          exit-code: 0          # warn — our base image may have known CVEs
          format: table

      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update image tag in deployment manifest
        run: |
          # Extract just the tag portion (e.g. sha-abc1234)
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep -oP 'sha-[a-f0-9]+')
          FULL_IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          echo "Updating deployment to image: ${FULL_IMAGE}"

          # Update image reference
          sed -i "s|image: devsecops-demo:.*|image: ${FULL_IMAGE}|" k8s/base/deployment.yaml
          sed -i "s|image: ghcr.io/alloysartifexlabs/devsecops-demo:.*|image: ${FULL_IMAGE}|" k8s/base/deployment.yaml

          # Switch from local to registry pull policy
          sed -i "s|imagePullPolicy: Never|imagePullPolicy: Always|" k8s/base/deployment.yaml

          # Commit back to repo — [skip ci] prevents triggering pipeline again
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image to ${IMAGE_TAG} [skip ci]"
          git push