# kind-config.yaml
# Creates a 1 control-plane + 2 worker node cluster.
# Extra port mappings expose HTTP/HTTPS for ArgoCD UI access.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devsecops
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
    labels:
      workload: app
  - role: worker
    labels:
      workload: app